name: Deploy

# 只在「推送到 main 分支」时触发自动部署;也支持在 Actions 页面手动点击触发
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH 登录服务器并部署
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            export PATH=$PATH:/usr/local/bin:/usr/bin
            export NODE_ENV=production
            cd /opt/key-manager
            echo "==> 拉取最新代码"
            # 国内服务器拉 GitHub 容易断流,放宽缓冲与低速超时,并重试多次
            git config http.postBuffer 524288000
            git config http.lowSpeedLimit 0
            git config http.lowSpeedTime 600
            ok=0
            for i in 1 2 3 4 5; do
              if git fetch origin main; then ok=1; break; fi
              echo "fetch 第 $i 次失败,5 秒后重试..."
              sleep 5
            done
            [ "$ok" = 1 ] || { echo "拉取代码多次失败,放弃"; exit 1; }
            git reset --hard origin/main
            echo "==> 写入 .env 配置(从 GitHub Secrets)"
            cat > .env <<EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            PORT=3000
            EOF
            echo "==> 安装依赖"
            pnpm install --frozen-lockfile
            echo "==> 同步数据库表结构"
            pnpm db:push
            echo "==> 构建项目"
            pnpm build
            echo "==> 重启服务"
            pm2 restart key-manager --update-env
            pm2 save
            echo "==> 部署完成"
